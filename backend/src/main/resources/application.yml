spring:
  application:
    name: smart-oilfield-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_oilfield
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  port: 8080
  servlet:
    context-path: /api

mqtt:
  broker: tcp://localhost:1883
  client-id: smart-oilfield-backend
  username: admin
  password: admin
  alarm-topic: oilfield/alarms
  data-topic: oilfield/data/+

allocation:
  schedule: "0 0 2 * * ?"
  days-interval: 7
  model-version: "1.0.0"

alarm:
  water-cut-rise-threshold: 5.0
  pressure-threshold-ratio: 0.8
  check-schedule: "0 0 1 * * ?"

logging:
  level:
    com.smart.oilfield: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
