global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'clay-monitor'
    env: 'production'

scrape_configs:
  - job_name: 'clay-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:5000']
        labels:
          service: 'clay-monitor-api'
    scrape_interval: 10s

  - job_name: 'nginx'
    static_configs:
      - targets: ['frontend:8080']
        labels:
          service: 'clay-monitor-frontend'
    metrics_path: '/stub_status'
