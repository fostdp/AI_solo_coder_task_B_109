version: "3.9"

x-common-env: &common-env
  TZ: Asia/Shanghai
  ASPNETCORE_ENVIRONMENT: Production

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clay-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      <<: *common-env
      ASPNETCORE_URLS: http://+:5000
      Database__ConnectionString: "Data Source=/app/data/sculpture_monitor.db"
      AlertDispatch__DingTalkWebhookUrl: ${DINGTALK_WEBHOOK:-}
      AlertDispatch__DingTalkSecret: ${DINGTALK_SECRET:-}
      AlertDispatch__SurfaceCoverageThreshold: ${COVERAGE_THRESHOLD:-30.0}
      AlertDispatch__NaConcentrationThreshold: ${NA_THRESHOLD:-500.0}
      SaltTransport__SpaceStepCm: ${SALT_DZ:-0.5}
      SaltTransport__EnrichmentFactor: ${ENRICHMENT_FACTOR:-2.5}
      SaltTransport__MaxEvaporationRate: ${MAX_EVAP_RATE:-0.1}
      MaterialScore__PenetrationDepthWeight: ${W_PENETRATION:-0.25}
    volumes:
      - clay-data:/app/data
      - clay-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/swagger/v1/swagger.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - clay-net
    labels:
      com.clay-monitor.service: "backend"
      prometheus.scrape: "true"
      prometheus.port: "5000"
      prometheus.path: "/metrics"

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: clay-simulator
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      <<: *common-env
      BACKEND_URL: http://backend:5000
      REPORT_INTERVAL_MINUTES: ${REPORT_INTERVAL:-45}
      FAST_MODE: ${FAST_MODE:-false}
      INJECT_HIGH_NA: ${INJECT_HIGH_NA:-6,21}
    networks:
      - clay-net
    labels:
      com.clay-monitor.service: "simulator"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clay-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - backend
    volumes:
      - ./frontend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - clay-net
    labels:
      com.clay-monitor.service: "frontend"

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: clay-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=2GB"
      - "--web.enable-lifecycle"
    depends_on:
      - backend
    networks:
      - clay-net
    labels:
      com.clay-monitor.service: "prometheus"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: clay-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-clay123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/overview.json
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - clay-net
    labels:
      com.clay-monitor.service: "grafana"

volumes:
  clay-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}
  clay-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  clay-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
