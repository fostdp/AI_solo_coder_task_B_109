<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧油田注水开发动态调控系统</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>智慧油田注水开发动态调控系统</h1>
            <div class="header-info">
                <span id="current-time">--</span>
                <span class="status-indicator online">系统在线</span>
            </div>
        </header>

        <div class="main-content">
            <aside class="left-panel">
                <div class="panel-section">
                    <h3>核心指标</h3>
                    <div class="indicator-cards">
                        <div class="indicator-card oil">
                            <div class="indicator-label">日产油量</div>
                            <div class="indicator-value" id="daily-oil">--</div>
                            <div class="indicator-unit">t</div>
                            <div class="indicator-change" id="oil-change">--</div>
                        </div>
                        <div class="indicator-card water">
                            <div class="indicator-label">日注水量</div>
                            <div class="indicator-value" id="daily-water">--</div>
                            <div class="indicator-unit">m³</div>
                            <div class="indicator-change" id="water-change">--</div>
                        </div>
                        <div class="indicator-card cut">
                            <div class="indicator-label">综合含水率</div>
                            <div class="indicator-value" id="water-cut">--</div>
                            <div class="indicator-unit">%</div>
                            <div class="indicator-change" id="cut-change">--</div>
                        </div>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>区块筛选</h3>
                    <select id="block-selector" class="form-control">
                        <option value="ALL">全部区块</option>
                    </select>
                </div>

                <div class="panel-section">
                    <h3>图层控制</h3>
                    <div class="layer-controls">
                        <label class="checkbox-item">
                            <input type="checkbox" id="show-injection" checked>
                            <span class="legend-circle injection"></span>
                            注水井
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="show-production" checked>
                            <span class="legend-triangle production"></span>
                            采油井
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="show-relations" checked>
                            <span class="legend-line"></span>
                            注采对应关系
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="show-allocation" checked>
                            <span class="legend-arrow"></span>
                            调配建议
                        </label>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>注采受效图例</h3>
                    <div class="legend-items">
                        <div class="legend-item">
                            <span class="legend-line" style="background: #00FF00;"></span>
                            <span>高效受效</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-line" style="background: #FFFF00;"></span>
                            <span>中等受效</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-line" style="background: #FF0000;"></span>
                            <span>无效受效</span>
                        </div>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>告警信息 <span class="badge" id="alarm-badge">0</span></h3>
                    <div class="alarm-list" id="alarm-list">
                        <div class="no-data">暂无告警</div>
                    </div>
                </div>
            </aside>

            <main class="map-container">
                <div id="map"></div>
                <canvas id="well-canvas"></canvas>
                <div class="map-controls">
                    <button class="control-btn" onclick="refreshAllData()">
                        <span>🔄</span> 刷新数据
                    </button>
                    <button class="control-btn" onclick="runAllocation()">
                        <span>📊</span> 生成调配建议
                    </button>
                    <button class="control-btn" onclick="checkAlarms()">
                        <span>⚠️</span> 检查告警
                    </button>
                </div>
            </main>

            <aside class="right-panel" id="detail-panel" style="display: none;">
                <div class="panel-header">
                    <h3 id="detail-title">井详情</h3>
                    <button class="close-btn" onclick="closeDetailPanel()">×</button>
                </div>
                <div class="panel-content" id="detail-content">
                </div>
            </aside>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/map.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
